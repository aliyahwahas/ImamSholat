<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#10b981">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Absensi Imam">
  
  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="logo-192.png">
  <link rel="icon" type="image/png" href="logo-192.png">

  <title>Absensi Imam Sholat</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #050a15; /* Warna background sesuai tema aplikasi Anda */
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>

  <!-- GANTI URL DI BAWAH INI DENGAN URL WEB APP APPS SCRIPT ANDA -->
  <iframe src="https://script.google.com/macros/s/AKfycbyhp3Y7qfCq-ax_PujyOU2mXnj331D2vYYovcY52PWbu26UUILW4g69-ZQ6UxAHTwLJ/exec"></iframe>

  <script>
    // Registrasi Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => {
            console.log('ServiceWorker registered successfully:', registration.scope);
          })
          .catch(err => {
            console.error('ServiceWorker registration failed:', err);
          });
      });
    }
  </script>
</body>
</html>
